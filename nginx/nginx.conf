# ── EventZen Nginx Gateway ────────────────────────────────────────────────────
#
# This is the ONLY entry point. Port 8080 is exposed to the outside world.
# Everything else (8081, 8082, 8083, 27017, 3306) stays internal to Docker.
#
# Routing rules:
#   /api/auth/**         → node-service:8081  (Node.js auth)
#   /api/attendees/**    → node-service:8081  (Node.js attendees)
#   /api/notifications/**→ node-service:8081  (Node.js notifications)
#   /api/users/**        → node-service:8081  (Node.js user admin)
#   /api/events/**       → spring-service:8082 (Spring Boot events)
#   /api/venues/**       → spring-service:8082 (Spring Boot venues)
#   /api/schedule/**     → spring-service:8082 (Spring Boot schedule)
#   /api/budget/**       → dotnet-service:8083 (ASP.NET budget)
#   /api/reports/**      → dotnet-service:8083 (ASP.NET reports)
#   /health              → this nginx (gateway health)
#   everything else      → frontend SPA build (served by nginx)
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones (per client IP) ─────────────────────────────────────
# Defined at http-context scope via conf.d include.
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=20r/m;

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;
    absolute_redirect off;
    limit_req_status 429;
    client_max_body_size 16m;

    # Re-resolve Docker service names periodically to avoid stale upstream IPs
    # after containers are recreated by docker compose up --build.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Increase timeout for slow cold starts (Spring Boot JVM startup)
    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # Pass real client IP to backend services
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Normalize trailing slashes for API routes.
    # Example: /api/venues/ -> /api/venues, /api/venues/1/ -> /api/venues/1
    # 308 keeps the original HTTP method/body for non-GET requests.
    location ~ ^(/api/.+)/$ {
        return 308 $1$is_args$args;
    }

    # ── Node.js routes ─────────────────────────────────────────────────────
    location /api/auth {
        limit_req zone=auth_per_ip burst=20 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location /api/attendees {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location /api/notifications {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location = /api/notifications/stream {
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    location /api/users {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location /api/uploads {
        limit_req zone=api_per_ip burst=120 nodelay;
        client_max_body_size 16m;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location ~ ^/api/vendor-applications(?:/|$) {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location ~ ^/api/admin/vendor-applications(?:/|$) {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location /api/reviews {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    location /api/payments {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $node_upstream http://node-service:8081;
        proxy_pass $node_upstream;
    }

    # ── Media routes (MinIO object storage) ───────────────────────────────
    location /media/ {
        rewrite ^/media/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio;
    }

    # ── Spring Boot routes ─────────────────────────────────────────────────
    location /api/events {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $spring_upstream http://spring-service:8082;
        proxy_pass $spring_upstream;
    }

    location /api/venues {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $spring_upstream http://spring-service:8082;
        proxy_pass $spring_upstream;
    }

    location /api/schedule {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $spring_upstream http://spring-service:8082;
        proxy_pass $spring_upstream;
    }

    # ── ASP.NET routes ─────────────────────────────────────────────────────
    location /api/budget {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $dotnet_upstream http://dotnet-service:8083;
        proxy_pass $dotnet_upstream;
    }

    location /api/reports {
        limit_req zone=api_per_ip burst=120 nodelay;
        set $dotnet_upstream http://dotnet-service:8083;
        proxy_pass $dotnet_upstream;
    }

    # ── Gateway health check ───────────────────────────────────────────────
    location = /health {
        return 200 '{"status":"ok","service":"nginx-gateway"}';
        add_header Content-Type application/json;
    }

    # ── Nginx internal status for exporter scraping ───────────────────────
    location = /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # ── Metrics endpoints are never exposed via the public gateway ────────
    location = /metrics {
        return 404 '{"success":false,"message":"Route not found."}';
        add_header Content-Type application/json;
    }

    location = /actuator/prometheus {
        return 404 '{"success":false,"message":"Route not found."}';
        add_header Content-Type application/json;
    }

    # ── Internal routes are never exposed through the public gateway ───────
    location /api/internal {
        return 404 '{"success":false,"message":"Route not found."}';
        add_header Content-Type application/json;
    }

    # ── Unknown API routes should return JSON 404 (not SPA index.html) ─────
    location /api {
        return 404 '{"success":false,"message":"Route not found."}';
        add_header Content-Type application/json;
    }

    # ── Frontend SPA (served from /usr/share/nginx/html) ───────────────────
    # Must be last — all API routes are matched above.

    # Always fetch the HTML shell fresh so new deployments are picked up.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
