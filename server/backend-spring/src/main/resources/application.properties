# ── Server ─────────────────────────────────────────────────────────────────────
server.port=${PORT:8082}

# ── MySQL ──────────────────────────────────────────────────────────────────────
# All values read from environment variables with sensible local dev defaults.
# In Docker: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eventzen?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection pool (HikariCP) ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ────────────────────────────────────────────────────────────────────────
# MUST match JWT_SECRET in root .env — tokens are issued by Node.js only
jwt.secret=${JWT_SECRET}

# ── Internal service secret ────────────────────────────────────────────────────
# Used to protect internal endpoints like:
# PATCH /api/internal/events/:id/rating and GET /api/internal/events/:id/ownership
internal.secret=${INTERNAL_SERVICE_SECRET}

# ── Cross-service (Node attendee counts) ─────────────────────────────────────
node.service.base-url=${NODE_SERVICE_BASE_URL:http://localhost:8081}

# ── Kafka (cross-service async messaging) ─────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
app.kafka.enabled=${KAFKA_ENABLED:true}
app.kafka.topics.event-lifecycle=${KAFKA_EVENT_LIFECYCLE_TOPIC:eventzen.event.lifecycle}

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# ── Pagination ─────────────────────────────────────────────────────────────────
app.pagination.default-page-size=12

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.eventzen=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=WARN
