global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: eventzen
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: eventzen-node
    metrics_path: /metrics
    static_configs:
      - targets: ['node-service:8081']

  - job_name: eventzen-spring
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['spring-service:8082']

  - job_name: eventzen-dotnet
    metrics_path: /metrics
    static_configs:
      - targets: ['dotnet-service:8083']

  - job_name: nginx-exporter
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: mongodb-exporter
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: mysqld-exporter
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']
