# ── EventZen — Full Stack Docker Compose ────────────────────────────────────
#
# Start everything:   docker compose up --build
# Stop everything:    docker compose down
# Wipe databases:     docker compose down -v   (removes named volumes)
# Rebuild one service: docker compose up --build node-service
#
# Public app entry point: 8080 (Nginx gateway).
# Database ports are bound to 127.0.0.1 for local tooling only.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Databases ────────────────────────────────────────────────────────────────

  mongo-db:
    image: mongo:7
    container_name: eventzen-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_HOST_PORT:-27018}:27017"  # local-only (Compass/CLI)
    volumes:
      - mongo_data:/data/db  # named volume — data persists between restarts
    networks:
      - eventzen-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql-db:
    image: mysql:8
    container_name: eventzen-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"  # local-only, avoids 3306 conflicts
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      eventzen
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eventzen-network
    # ⚠️ Spring Boot WILL crash if MySQL isn't ready — this healthcheck prevents that
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: eventzen-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - eventzen-network

  kafka:
    image: redpandadata/redpanda:latest
    container_name: eventzen-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      - --advertise-kafka-addr
      - INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9094}
    ports:
      - "127.0.0.1:${KAFKA_HOST_PORT:-9094}:9094"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    networks:
      - eventzen-network
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Monitoring stack ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: eventzen-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      node-service:
        condition: service_started
      spring-service:
        condition: service_started
      dotnet-service:
        condition: service_started
      mongodb-exporter:
        condition: service_started
      mysqld-exporter:
        condition: service_started
      kafka-exporter:
        condition: service_started
      nginx-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
    networks:
      - eventzen-network

  grafana:
    image: grafana/grafana:12.1.1
    container_name: eventzen-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - eventzen-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    container_name: eventzen-nginx-exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://nginx-gateway/nginx_status
    depends_on:
      nginx-gateway:
        condition: service_started
    networks:
      - eventzen-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: eventzen-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - eventzen-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.43
    container_name: eventzen-mongodb-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://mongo-db:27017
      - --collect-all
    depends_on:
      mongo-db:
        condition: service_healthy
    networks:
      - eventzen-network

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: eventzen-mysqld-exporter
    restart: unless-stopped
    command:
      - --mysqld.username=root
      - --mysqld.address=mysql-db:3306
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - eventzen-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: eventzen-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - eventzen-network

  # ── Backend Services ─────────────────────────────────────────────────────────

  vault-preflight:
    image: curlimages/curl:8.12.1
    container_name: eventzen-vault-preflight
    restart: "no"
    command:
      - sh
      - -ec
      - |
        for i in $(seq 1 30); do
          if curl -fsS "${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}/v1/sys/health" >/dev/null; then
            exit 0
          fi
          echo "waiting for Vault... attempt $${i}/30"
          sleep 2
        done
        echo "Vault is unavailable at ${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}" >&2
        exit 1
    environment:
      VAULT_DOCKER_ADDR: ${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}
    networks:
      - eventzen-network

  vault-secrets-init:
    image: curlimages/curl:8.12.1
    container_name: eventzen-vault-secrets-init
    restart: "no"
    user: "0:0"
    command: ["sh", "/vault-scripts/vault-secrets-init.sh"]
    environment:
      VAULT_ADDR: ${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}
      VAULT_SKIP_TLS_VERIFY: ${VAULT_SKIP_TLS_VERIFY:-true}
      VAULT_WRAPPED_SECRET_ID: ${VAULT_WRAPPED_SECRET_ID}
      VAULT_EXPECTED_WRAP_CREATION_PATH: ${EZ_VAULT_WRAP_PATH:-auth/token/create}
      VAULT_SHARED_RUNTIME_DIR: /vault-runtime
      VAULT_SHARED_CLIENT_TOKEN_FILE: /vault-runtime/client_token
    volumes:
      - vault_runtime:/vault-runtime
      - ./scripts/vault/vault-secrets-init.sh:/vault-scripts/vault-secrets-init.sh:ro
    depends_on:
      vault-preflight:
        condition: service_completed_successfully
    networks:
      - eventzen-network

  user-seed:
    build:
      context: ./server/backend-node
      dockerfile: Dockerfile.node
    container_name: eventzen-user-seed
    restart: "no"
    command: ["node", "src/scripts/seedUsers.js"]
    environment:
      NODE_ENV:            production
      MONGO_URI:           mongodb://mongo-db:27017/eventzen_node
      VAULT_ENABLED:       ${VAULT_ENABLED:-true}
      VAULT_ADDR:          ${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}
      VAULT_SKIP_TLS_VERIFY: ${VAULT_SKIP_TLS_VERIFY:-true}
      VAULT_KV_MOUNT:      ${VAULT_KV_MOUNT:-secret}
      VAULT_KV_PATH:       ${VAULT_KV_PATH:-eventzen/ez-secrets}
      VAULT_SHARED_CLIENT_TOKEN_FILE: /vault-runtime/client_token
    depends_on:
      vault-secrets-init:
        condition: service_completed_successfully
      mongo-db:
        condition: service_healthy
    volumes:
      - vault_runtime:/vault-runtime:ro
    networks:
      - eventzen-network

  node-service:
    build:
      context: ./server/backend-node
      dockerfile: Dockerfile.node
    container_name: eventzen-node
    restart: unless-stopped
    environment:
      NODE_ENV:                 production
      PORT:                     8081
      MONGO_URI:                mongodb://mongo-db:27017/eventzen_node
      VAULT_ENABLED:            ${VAULT_ENABLED:-true}
      VAULT_ADDR:               ${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}
      VAULT_SKIP_TLS_VERIFY:    ${VAULT_SKIP_TLS_VERIFY:-true}
      VAULT_KV_MOUNT:           ${VAULT_KV_MOUNT:-secret}
      VAULT_KV_PATH:            ${VAULT_KV_PATH:-eventzen/ez-secrets}
      VAULT_SHARED_CLIENT_TOKEN_FILE: /vault-runtime/client_token
      JWT_ACCESS_EXPIRY:        15m
      JWT_REFRESH_EXPIRY:       7d
      SPRING_BASE_URL:          http://spring-service:8082
      COOKIE_SECURE:            ${COOKIE_SECURE:-false}
      CLIENT_URL:               ${CLIENT_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS:     ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      TRUST_PROXY:              ${TRUST_PROXY:-1}
      POLAR_SERVER:             ${POLAR_SERVER:-sandbox}
      MINIO_ENDPOINT:           ${MINIO_ENDPOINT:-minio:9000}
      MINIO_BUCKET:             ${MINIO_BUCKET:-eventzen-media}
      MINIO_PUBLIC_BASE_URL:    ${MINIO_PUBLIC_BASE_URL:-http://localhost:8080/media}
      KAFKA_ENABLED:             ${KAFKA_ENABLED:-true}
      KAFKA_BROKERS:             ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_CLIENT_ID:           ${NODE_KAFKA_CLIENT_ID:-eventzen-node}
      KAFKA_EVENT_LIFECYCLE_TOPIC: ${KAFKA_EVENT_LIFECYCLE_TOPIC:-eventzen.event.lifecycle}
      KAFKA_REGISTRATION_TOPIC:    ${KAFKA_REGISTRATION_TOPIC:-eventzen.registration.lifecycle}
      KAFKA_PAYMENT_TOPIC:         ${KAFKA_PAYMENT_TOPIC:-eventzen.payment.lifecycle}
    depends_on:
      vault-secrets-init:
        condition: service_completed_successfully
      user-seed:
        condition: service_completed_successfully
      mongo-db:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - vault_runtime:/vault-runtime:ro
    networks:
      - eventzen-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  spring-service:
    build:
      context: ./server/backend-spring
      dockerfile: Dockerfile.spring
    container_name: eventzen-spring
    restart: unless-stopped
    environment:
      VAULT_ENABLED:                      ${VAULT_ENABLED:-true}
      VAULT_ADDR:                         ${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}
      VAULT_SKIP_TLS_VERIFY:              ${VAULT_SKIP_TLS_VERIFY:-true}
      VAULT_KV_MOUNT:                     ${VAULT_KV_MOUNT:-secret}
      VAULT_KV_PATH:                      ${VAULT_KV_PATH:-eventzen/ez-secrets}
      VAULT_SHARED_CLIENT_TOKEN_FILE:     /vault-runtime/client_token
      SPRING_DATASOURCE_URL:              jdbc:mysql://mysql-db:3306/eventzen?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME:         root
      SPRING_JPA_HIBERNATE_DDL_AUTO:      update
      NODE_SERVICE_BASE_URL:              http://node-service:8081
      CORS_ALLOWED_ORIGINS:               ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      KAFKA_ENABLED:                      ${KAFKA_ENABLED:-true}
      KAFKA_BOOTSTRAP_SERVERS:            ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_EVENT_LIFECYCLE_TOPIC:        ${KAFKA_EVENT_LIFECYCLE_TOPIC:-eventzen.event.lifecycle}
    # ⚠️ MySQL must pass its healthcheck before Spring Boot starts
    depends_on:
      vault-secrets-init:
        condition: service_completed_successfully
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - vault_runtime:/vault-runtime:ro
    networks:
      - eventzen-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s   # JVM startup takes longer than Node.js

  dotnet-service:
    build:
      context: ./server/backend-dotnet
      dockerfile: Dockerfile.dotnet
    container_name: eventzen-dotnet
    restart: unless-stopped
    environment:
      VAULT_ENABLED:             ${VAULT_ENABLED:-true}
      VAULT_ADDR:                ${VAULT_DOCKER_ADDR:-http://host.docker.internal:8200}
      VAULT_SKIP_TLS_VERIFY:     ${VAULT_SKIP_TLS_VERIFY:-true}
      VAULT_KV_MOUNT:            ${VAULT_KV_MOUNT:-secret}
      VAULT_KV_PATH:             ${VAULT_KV_PATH:-eventzen/ez-secrets}
      VAULT_SHARED_CLIENT_TOKEN_FILE: /vault-runtime/client_token
      ASPNETCORE_ENVIRONMENT:     Production
      ASPNETCORE_URLS:            http://+:8083
      MongoDB__ConnectionString:  mongodb://mongo-db:27017
      MongoDB__DatabaseName:      eventzen_budget
      Spring__BaseUrl:            http://spring-service:8082
      Node__BaseUrl:              http://node-service:8081
      Cors__AllowedOrigins:       ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      Kafka__Enabled:             ${KAFKA_ENABLED:-true}
      Kafka__BootstrapServers:    ${KAFKA_BROKERS:-kafka:9092}
      Kafka__ClientId:            ${DOTNET_KAFKA_CLIENT_ID:-eventzen-dotnet-budget}
      Kafka__EventLifecycleTopic: ${KAFKA_EVENT_LIFECYCLE_TOPIC:-eventzen.event.lifecycle}
      Kafka__PaymentTopic:        ${KAFKA_PAYMENT_TOPIC:-eventzen.payment.lifecycle}
      Kafka__RegistrationTopic:   ${KAFKA_REGISTRATION_TOPIC:-eventzen.registration.lifecycle}
    depends_on:
      vault-secrets-init:
        condition: service_completed_successfully
      mongo-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - vault_runtime:/vault-runtime:ro
    networks:
      - eventzen-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Gateway ───────────────────────────────────────────────────────────────────

  nginx-gateway:
    build:
      context: .
      dockerfile: nginx/Dockerfile.gateway
    container_name: eventzen-nginx
    restart: unless-stopped
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:80"            # THE ONLY public app port
    depends_on:
      node-service:
        condition: service_healthy
      spring-service:
        condition: service_healthy
      dotnet-service:
        condition: service_healthy
    networks:
      - eventzen-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Named volumes (data persists between `docker compose down` restarts) ───────
volumes:
  mongo_data:
  mysql_data:
  minio_data:
  kafka_data:
  vault_runtime:
  prometheus_data:
  grafana_data:

# ── Internal network (services talk to each other by name, not by IP) ─────────
networks:
  eventzen-network:
    driver: bridge
