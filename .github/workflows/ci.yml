name: CI

on:
  pull_request:
    branches: [main, dev, develop]
  push:
    branches: [main, dev, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/backend-node/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Node backend dependencies
        working-directory: server/backend-node
        run: npm ci

      - name: Run Node tests
        working-directory: server/backend-node
        run: npm test

      - name: Run Spring tests
        working-directory: server/backend-spring
        run: mvn test -DskipITs

      - name: Run .NET tests
        working-directory: server/backend-dotnet
        run: dotnet test EventZen.Budget.Tests/EventZen.Budget.Tests.csproj

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client lint
        working-directory: client
        run: npm run lint -- --max-warnings=0

      - name: Run client build
        working-directory: client
        run: npm run build
